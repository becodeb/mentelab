services:
  postgres:
    image: postgres:16-alpine
    container_name: mentelab-postgres
    environment:
      POSTGRES_USER: mentelab
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mentelab}
      POSTGRES_DB: mentelab
    volumes:
      - mentelab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentelab"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - mentelab

  redis:
    image: redis:7-alpine
    container_name: mentelab-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - mentelab

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mentelab-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      DATABASE_URL: postgresql://mentelab:${DB_PASSWORD:-mentelab}@postgres:5432/mentelab
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mentelab

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: mentelab-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mentelab

volumes:
  mentelab_pgdata:

networks:
  mentelab:
    driver: bridge
