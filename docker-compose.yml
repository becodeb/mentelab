services:
  postgres:
    image: postgres:16-alpine
    container_name: mentelab-postgres
    environment:
      POSTGRES_USER: mentelab
      POSTGRES_PASSWORD: mentelab
      POSTGRES_DB: mentelab
    ports:
      - "5440:5432"
    volumes:
      - mentelab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentelab"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mentelab-redis
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mentelab_pgdata:
